<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-5</title>
    <style type="text/css">
        /* Class Selector */
        .wrapper{
            margin: 0 auto;
            width: 1100px;
            height: 350px;
            border: 1px solid #000;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .content{
            width: 350px;
            height: 350px;
            border: 1px solid #000;
        }
        .bg-red{
            background-color: rgb(255, 184, 184);
        }
        .bg-green{
            background-color: rgb(203, 255, 124);
        }
        .bg-yellow{
            background-color: rgb(255, 255, 157);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="content bg-green">
            <p>1</p>
        </div>
        <div class="content bg-yellow">
             <p>2</p>
        </div>
        <div class="content bg-red">
             <p>3</p>
        </div>
    </div>
</body>
</html>

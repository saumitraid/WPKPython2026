<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-6</title>
    <style type="text/css">
        .container{
            display: grid;
            /* grid-template-columns: auto auto; */
            grid-template-columns: 20% 60% 20%;
            background-color: dodgerblue;
        }
        .container div{
            background-color: #f1f1f1;
            border: 1px solid #000;
            padding: 10px;
            font-size: 30px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
</body>
</html>
